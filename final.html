
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Квиз</title>
    <link
        rel="stylesheet"
        href="css/start.css"
    >
</head>
<body class="dark-theme">
    <div class="start-page">
        <h1 class="title">
            ФИНАЛ! 🛡️ Миссия выполнена!
        </h1>
        <h2>Ты прошёл все испытания.</h2>
        <p>
            <h3>Твои навыки:</h3>
            <ul>
                <li>✓ распознаёшь фишинг</li>
                <li>✓ защищаешь пароли</li>
                <li>✓ проверяешь сайты</li>
                <li>✓ защищаешь пароли</li>
            </ul>
        </p>
        <div id="modalScore">
            
        </div>
    </div>
    <script>
            const user = localStorage.getItem("username") || "Пользователь";

            modalScore.style.display = "flex";
        
            modalScore.innerHTML = `
                <div class="modal-content">
                    <h2>🏁 Квиз завершён</h2>
        
                    <p><b>${user}</b></p>
        
                    <p>✔ Правильных ответов: ${score}</p>
                    <p>❌ Неправильных ответов: ${wrong}</p>
        
                    <h3>
                        Вы набрали ${score} баллов
                    </h3>
        
                    <button id="close">Закрыть</button>
                </div>
            `;
        
            document
                .querySelector("#close")
                .addEventListener("click", () => {
                    modalScore.style.display = "none";
                })
    </script>
</body>
</html>
