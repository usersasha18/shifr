
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Квиз</title>
    <link
        rel="stylesheet"
        href="css/start.css"
    >
</head>
<body class="dark-theme">
    <div class="start-page">
        <h1 class="title">
            КИБЕРКВЕСТ <br>«СПАСИ АККАУНТ»</br>
        </h1>
        <p>
            Сегодня злоумышленники пытаются украсть аккаунты учеников школы.
            Твоя задача — пройти все испытания и сохранить данные.
            <br>Правила:</br>
            <br>Читай ситуацию.</br>
            <br>Выбирай один ответ.</br>
            <br>Переходи по ссылке.</br>
            <br>Ошибся → вернись и попробуй снова.</br>

        </p>
        <p class="subtitle">
            Введи имя и фамилию перед началом
        </p>
        <form class="start-form">
            <input id="name" type="text" placeholder="Имя" required > 
            <input id="surname" type="text" placeholder="Фамилия" required >
            <button
                type="submit"
                class="start-btn"
            >
                Начать
            </button>
        </form>
    </div>
    <script src="js/start.js"></script>
</body>
</html>
